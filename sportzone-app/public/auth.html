<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="stylesheet" href="/css/styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
  <title>Sign In — SportZone</title>
  <meta name="description" content="Sign in to SportZone to book venues and join tournaments."/>
</head>
<body>
  <div class="min-h-screen flex flex-col">
    <!-- Header -->
    <header class="sticky top-0 z-50 backdrop-blur-xl bg-background/70 border-b border-border">
      <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
        <a href="/" class="flex items-center gap-2 group">
          <div class="w-9 h-9 rounded-lg bg-primary flex items-center justify-center shadow-[var(--shadow-glow)] group-hover:scale-110 transition-transform">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-zap w-5 h-5 text-primary-foreground" aria-hidden="true">
              <path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"></path>
            </svg>
          </div>
          <span class="font-display text-2xl font-bold tracking-tight">SPORT<span class="text-primary">ZONE</span></span>
        </a>
        
        <nav class="hidden md:flex items-center gap-1" id="nav-links">
          <a href="/" class="px-4 py-2 rounded-md text-sm font-medium text-muted-foreground hover:text-foreground hover:bg-secondary transition-colors" data-page="home">Home</a>
          <a href="/compare" class="px-4 py-2 rounded-md text-sm font-medium text-muted-foreground hover:text-foreground hover:bg-secondary transition-colors" data-page="compare">Why SportZone</a>
          <a href="/dashboard" class="px-4 py-2 rounded-md text-sm font-medium text-muted-foreground hover:text-foreground hover:bg-secondary transition-colors" data-page="dashboard">Dashboard</a>
        </nav>
        
        <div class="flex items-center gap-4">
          <span id="user-display" class="hidden text-xs text-muted-foreground font-semibold"></span>
          <a id="auth-btn" class="inline-flex items-center px-5 py-2 rounded-md bg-primary text-primary-foreground font-semibold text-sm hover:opacity-90 transition shadow-[var(--shadow-glow)] active" href="/auth">Sign in</a>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex items-center justify-center px-6 py-16 relative overflow-hidden">
      <div class="absolute inset-0 -z-10" style="background:var(--gradient-hero)"></div>
      <div class="w-full max-w-md">
        <div class="text-center mb-8">
          <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-primary/10 border border-primary/30 text-primary text-xs font-semibold tracking-wider mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-zap w-3 h-3" aria-hidden="true">
              <path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"></path>
            </svg> 
            WELCOME BACK
          </div>
          <h1 class="font-display text-4xl md:text-5xl font-bold uppercase leading-none" id="form-title">Sign in</h1>
          <p class="text-muted-foreground mt-3 text-sm" id="form-subtitle">Access your bookings, brackets and team stats.</p>
        </div>

        <div class="rounded-2xl border border-border bg-card/80 backdrop-blur p-6 md:p-8" style="box-shadow:var(--shadow-card)">
          <!-- Simulated Google Button -->
          <button type="button" id="google-btn" class="w-full inline-flex items-center justify-center gap-3 px-4 py-3 rounded-md bg-secondary hover:bg-secondary/70 border border-border font-semibold text-sm transition">
            <svg class="w-5 h-5" viewBox="0 0 24 24" aria-hidden="true">
              <path fill="#FFC107" d="M43.6 20.5h-1.9V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.2 7.9 3l5.7-5.7C34 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.4-.4-3.5z"></path>
              <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 16 19 13 24 13c3.1 0 5.8 1.2 7.9 3l5.7-5.7C34 6.1 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"></path>
              <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 35 26.7 36 24 36c-5.2 0-9.6-3.3-11.3-8l-6.5 5C9.6 39.6 16.2 44 24 44z"></path>
              <path fill="#1976D2" d="M43.6 20.5H24v8h11.3c-.8 2.3-2.2 4.2-4.1 5.6l6.2 5.2C40.9 36.7 44 30.9 44 24c0-1.3-.1-2.4-.4-3.5z"></path>
            </svg>Continue with Google (Simulated)
          </button>
          
          <div class="flex items-center gap-3 my-5">
            <div class="h-px flex-1 bg-border"></div>
            <span class="text-xs text-muted-foreground tracking-widest font-display">OR</span>
            <div class="h-px flex-1 bg-border"></div>
          </div>
          
          <div id="error-msg" class="hidden p-3 mb-4 rounded-md bg-destructive/20 border border-destructive/50 text-destructive text-xs font-semibold"></div>
          
          <form class="space-y-4" id="auth-form">
            <label class="block hidden" id="name-field-block">
              <span class="text-xs font-semibold tracking-wider text-muted-foreground">FULL NAME</span>
              <div class="mt-1 relative">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-users w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-muted-foreground" aria-hidden="true">
                  <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
                  <circle cx="9" cy="7" r="4"></circle>
                </svg>
                <input type="text" id="auth-name" placeholder="John Doe" class="w-full pl-10 pr-3 py-3 rounded-md bg-background border border-border focus:border-primary focus:outline-none text-sm text-foreground"/>
              </div>
            </label>
            
            <label class="block">
              <span class="text-xs font-semibold tracking-wider text-muted-foreground">EMAIL</span>
              <div class="mt-1 relative">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-mail w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-muted-foreground" aria-hidden="true">
                  <path d="m22 7-8.991 5.727a2 2 0 0 1-2.009 0L2 7"></path>
                  <rect x="2" y="4" width="20" height="16" rx="2"></rect>
                </svg>
                <input type="email" id="auth-email" required placeholder="you@team.com" class="w-full pl-10 pr-3 py-3 rounded-md bg-background border border-border focus:border-primary focus:outline-none text-sm text-foreground"/>
              </div>
            </label>
            
            <label class="block">
              <span class="text-xs font-semibold tracking-wider text-muted-foreground">PASSWORD</span>
              <div class="mt-1 relative">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-lock w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-muted-foreground" aria-hidden="true">
                  <rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
                <input type="password" id="auth-password" required placeholder="••••••••" class="w-full pl-10 pr-3 py-3 rounded-md bg-background border border-border focus:border-primary focus:outline-none text-sm text-foreground"/>
              </div>
            </label>
            
            <button type="submit" id="submit-btn" class="w-full inline-flex items-center justify-center gap-2 px-4 py-3 rounded-md bg-primary text-primary-foreground font-bold shadow-[var(--shadow-glow)] hover:scale-[1.02] transition">
              Sign in <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-arrow-right w-4 h-4" aria-hidden="true"><path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path></svg>
            </button>
          </form>
          
          <p class="text-center text-sm text-muted-foreground mt-6" id="toggle-container">
            New to SportZone? <button id="toggle-auth-btn" class="text-primary font-semibold hover:underline">Create an account</button>
          </p>
        </div>
        <p class="text-center text-xs text-muted-foreground mt-6"><a href="/" class="hover:text-foreground">← Back to home</a></p>
      </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-border mt-24">
      <div class="max-w-7xl mx-auto px-6 py-10 flex flex-col md:flex-row items-center justify-between gap-4 text-sm text-muted-foreground">
        <p>© 2026 SportZone — Booking & Tournament Management</p>
        <p class="font-display tracking-wider">PLAY · BOOK · COMPETE</p>
      </div>
    </footer>
  </div>

  <script src="/js/main.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
